<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeFun - Track & Discover Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Anime<span>Fun</span> 🎌</div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search anime (e.g., Naruto, One Piece)...">
            <button id="search-btn">Search</button>
        </div>
    </header>

    <main class="container">
        <div class="banner-container" style="width: 100%; margin-bottom: 25px;">
    <img src="https://raw.githubusercontent.com/haripaji/Streaming-/main/_.jpeg" alt="Anime Banner" class="anime-img" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
</div>

                <section class="player-section" id="player-section" style="display: none;">
            <div class="video-container">
                <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <div class="player-controls">
                <h2 id="player-title">Anime Title</h2>
                
                <div class="action-buttons">
                    <button id="like-btn" class="action-btn">🤍 <span id="like-text">Like</span></button>
                    <button id="comment-btn" class="action-btn">💬 Comment</button>
                    <button id="share-btn" class="action-btn">🔗 Share</button>
                    <button id="download-btn" class="action-btn">⬇️ Download</button>
                </div>
            </div>

            <div id="comment-section" class="comment-section" style="display: none;">
                <div class="comment-input-area">
                    <input type="text" id="comment-input" placeholder="Write a comment...">
                    <button id="submit-comment">Post</button>
                </div>
                <ul id="comment-list"></ul>
            </div>

            <button id="close-player">✖ Close Player</button>
        </section>


        <section class="content-area">
            <h2 id="section-title">🔥 Trending Anime</h2>
            <div class="anime-grid" id="anime-grid">
                <p class="loading">Loading trending anime...</p>
            </div>
        </section>

    </main>

    <button id="feedback-btn" class="floating-btn">💬 Feedback</button>

    <div id="feedback-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-feedback">&times;</span>
            <h2>Send Feedback</h2>
            <p style="text-align: center; font-size: 14px; margin-bottom: 15px;">Tell us what to improve or request an anime!</p>
            
            <form id="feedback-form">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Type your message here..." rows="4" required></textarea>
                <button type="submit" class="submit-btn">Send Message 🚀</button>
            </form>
        </div>
    </div>
    
        <button id="toggle-watchlist" class="mobile-watchlist-btn">⭐ Watchlist</button>
            <aside class="watchlist-sidebar">
            <span id="close-sidebar-btn" class="close-sidebar">✖</span>
            
            <h3>⭐ My Watchlist</h3>
            <ul id="watchlist-items">
                <p class="empty-msg">Your watchlist is empty.</p>
            </ul>
        </aside>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="script.js"></script>
</body>
</html>
