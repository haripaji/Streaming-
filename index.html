<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera Personal Video Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #ff4757;
        }
        .container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            gap: 20px;
            margin-top: 20px;
        }
        .main-player {
            flex: 2;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
        }
        .main-player iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .playlist {
            flex: 1;
            background: #2f3542;
            padding: 15px;
            border-radius: 8px;
            max-height: 500px;
            overflow-y: auto;
        }
        .playlist h3 {
            margin-top: 0;
            border-bottom: 2px solid #ff4757;
            padding-bottom: 10px;
        }
        .video-item {
            padding: 10px;
            background: #57606f;
            margin-bottom: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .video-item:hover {
            background: #ff4757;
        }
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h1>🎬 Mera Personal Video Jukebox</h1>

    <div class="container">
        <!-- Video Player Area -->
        <div class="main-player">
            <!-- Default pehle Doraemon chalega -->
            <iframe id="videoPlayer" src="https://www.youtube.com/embed/5kMszbB_9B4" allowfullscreen></iframe>
        </div>

        <!-- Playlist Area -->
        <div class="playlist">
            <h3>My Playlist</h3>
            
            <!-- Doraemon Theme Song Link Added Here -->
            <div class="video-item" onclick="changeVideo('https://hanime.tv/playlists/uoqprzowz5zh2slos2tg/video/mihitsu-no-koi-1')">💙 Doraemon Title Song (Hindi)</div>
            <div class="video-item" onclick="changeVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">🐸 Funny Frog (YouTube)</div>
            <div class="video-item" onclick="changeVideo('https://player.vimeo.com/video/76979871')">🌌 Space Video (Vimeo)</div>
            
        </div>
    </div>

    <script>
        function changeVideo(videoUrl) {
            document.getElementById('videoPlayer').src = videoUrl;
        }
    </script>

</body>
</html>
