<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnimeFun - Track, discover, and stream your favorite anime.">
    <title>AnimeFun - Track & Discover Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="logo">Anime<span class="highlight">Fun</span> 🎌</div>
            <div class="search-box">
                <input type="search" id="search-input" placeholder="Search anime (e.g., Naruto)..." autocomplete="off">
                <button id="search-btn" class="search-btn">Search</button>
            </div>
        </nav>
    </header>

    <main class="container">
        
        <section class="banner-section">
            <div class="banner-container">
                <img src="https://raw.githubusercontent.com/haripaji/Streaming-/main/_.jpeg" alt="Featured anime banner" class="anime-banner-img" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-bottom: 25px;">
            </div>
        </section>

        <section class="player-section" id="player-section" style="display: none; background: #161b22; padding: 20px; border-radius: 12px; margin-bottom: 30px;">
            <div class="player-wrapper">
                <div class="video-container" style="position: relative; padding-bottom: 56.25%; height: 0;">
                    <iframe id="video-player" src="" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; display: none;"></iframe>
                    <video id="local-video-player" controls autoplay style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; background: #000; display: none;"></video>
                </div>
                
                <div class="player-controls">
                    <h2 id="player-title" style="margin-top: 15px;">Anime Title</h2>
                    <div class="action-buttons" style="display: flex; gap: 10px; margin-top: 15px;">
                        <button id="like-btn" class="action-btn" style="flex: 1; padding: 10px; border-radius: 5px;">🤍 Like</button>
                        <button id="comment-btn" class="action-btn" style="flex: 1; padding: 10px; border-radius: 5px;">💬 Comment</button>
                    </div>
                </div>

                <section id="comment-section" style="display: none; margin-top: 15px; padding: 15px; background: #0d1117; border-radius: 8px;">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="comment-input" placeholder="Write a live comment..." style="flex: 1; padding: 10px; border-radius: 5px;">
                        <button id="submit-comment" style="padding: 10px 20px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer;">Post</button>
                    </div>
                    <ul id="comment-list" style="margin-top: 15px; list-style: none;"></ul>
                </section>

                <button id="close-player" style="width: 100%; padding: 10px; background: #555; color: white; border: none; border-radius: 5px; margin-top: 15px; cursor: pointer;">✖ Close Player</button>
            </div>
        </section>

        <section class="content-area" style="margin-top: 20px;">
            <h2 class="section-title" style="border-left: 4px solid #ff4757; padding-left: 10px; margin-bottom: 20px;">📂 My Local Videos</h2>
            <div class="anime-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
                <div class="anime-card" style="background: #161b22; padding: 10px; border-radius: 8px; text-align: center;">
                    <img src="https://images.unsplash.com/photo-1542204165-65bf26472b9b?w=300" alt="Local Thumbnail" style="width: 100%; height: 280px; object-fit: cover; border-radius: 5px;">
                    <h4 style="margin: 10px 0;">My First Project</h4>
                    <button class="play-btn" onclick="playVideo('video1.mp4', 'My First Project')" style="width: 100%; padding: 8px; background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer;">▶ Play Video</button>
                    <button class="add-btn" onclick="addToWatchlist('My First Project')" style="width: 100%; padding: 8px; background: #30363d; color: white; border: none; border-radius: 4px; margin-top: 5px; cursor: pointer;">＋ Add to List</button>
                </div>
            </div>
        </section>

        <section class="content-area" style="margin-top: 40px;">
            <h2 id="section-title" class="section-title" style="border-left: 4px solid #ff4757; padding-left: 10px; margin-bottom: 20px;">🔥 Trending Anime</h2>
            <div class="anime-grid" id="anime-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
                <p class="loading">Loading trending anime... ⏳</p>
            </div>
        </section>

    </main>

    <div class="floating-actions" style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;">
        <button id="toggle-watchlist" style="padding: 12px 20px; background: #ff4757; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">⭐ Watchlist</button>
    </div>

    <aside class="watchlist-sidebar" id="watchlist-sidebar" style="position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: #161b22; box-shadow: -5px 0 15px rgba(0,0,0,0.5); transition: 0.3s; padding: 20px; z-index: 2000; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px;">
            <h3 style="color: white;">⭐ My Watchlist</h3>
            <button id="close-sidebar-btn" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">✖</button>
        </div>
        <ul id="watchlist-items" style="list-style: none; color: white;"></ul>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. SUPABASE CONNECTION
        const supabaseUrl = 'https://maxalyasxiznqxmrzfzm.supabase.co';
        const supabaseKey = 'sb_publishable_oWAYCI2tk-k3NyCJkXk9_g_9PB4SIlj';
        let supabase = null;
        try {
            if (window.supabase) {
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            }
        } catch (e) { console.log("DB Offline"); }

        // 2. WATCHLIST LOGIC
        let watchlist = [];
        try { watchlist = JSON.parse(localStorage.getItem('animeWatchlist')) || []; } catch(e) {}

        window.addToWatchlist = function(title) {
            if (!watchlist.includes(title)) {
                watchlist.push(title);
                localStorage.setItem('animeWatchlist', JSON.stringify(watchlist));
                refreshWatchlistUI();
                alert(`"${title}" added!`);
            } else { alert("Already in watchlist!"); }
        }

        window.removeFromWatchlist = function(index) {
            watchlist.splice(index, 1);
            localStorage.setItem('animeWatchlist', JSON.stringify(watchlist));
            refreshWatchlistUI();
        }

        function refreshWatchlistUI() {
            const list = document.getElementById('watchlist-items');
            if(!list) return;
            list.innerHTML = watchlist.length ? '' : '<li style="color:#888;">List is empty.</li>';
            watchlist.forEach((title, i) => {
                list.innerHTML += `<li style="padding:10px; background:#0d1117; margin-bottom:5px; border-radius:5px; display:flex; justify-content:space-between;"><span>${title}</span> <button onclick="removeFromWatchlist(${i})" style="background:none; border:none; color:#ff4757; cursor:pointer;">❌</button></li>`;
            });
        }

        // 3. FETCH ANIME
        async function loadAnime(url) {
            const grid = document.getElementById('anime-grid');
            if(!grid) return;
            try {
                grid.innerHTML = '<p class="loading" style="color:white;">Loading anime... ⏳</p>';
                const response = await fetch(url);
                const data = await response.json();
                
                grid.innerHTML = '';
                if(!data.data || data.data.length === 0) {
                    grid.innerHTML = '<p style="color:white;">No anime found.</p>';
                    return;
                }

                data.data.forEach(anime => {
                    const trailerUrl = anime.trailer && anime.trailer.embed_url ? anime.trailer.embed_url : 'null';
                    // Inline onclick to guarantee it fires
                    grid.innerHTML += `
                        <div class="anime-card" style="background: #161b22; padding: 10px; border-radius: 8px; text-align: center;">
                            <img src="${anime.images.jpg.image_url}" alt="Cover" style="width: 100%; height: 280px; object-fit: cover; border-radius: 5px;">
                            <h4 style="margin: 10px 0; color: white; height: 38px; overflow: hidden;">${anime.title}</h4>
                            <button onclick="playVideo('${trailerUrl}', '${anime.title.replace(/'/g, "\\'")}')" style="width: 100%; padding: 8px; background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer;">▶ Play Trailer</button>
                            <button onclick="addToWatchlist('${anime.title.replace(/'/g, "\\'")}')" style="width: 100%; padding: 8px; background: #30363d; color: white; border: none; border-radius: 4px; margin-top: 5px; cursor: pointer;">＋ Add to List</button>
                        </div>
                    `;
                });
            } catch (err) {
                grid.innerHTML = '<p style="color:#ff4757;">Server is busy. Try searching manually!</p>';
            }
        }

        // 4. PLAYER LOGIC (Smart for Local & API)
        window.activeTitle = "";
        window.playVideo = function(url, title) {
            if (url === 'null' || !url) return alert("Sorry! No trailer available.");
            window.activeTitle = title;
            
            const playerSection = document.getElementById('player-section');
            const iframePlayer = document.getElementById('video-player');
            const localPlayer = document.getElementById('local-video-player');
            document.getElementById('player-title').innerText = `Playing: ${title}`;

            if(url.includes('.mp4') || url.includes('.webm')) {
                iframePlayer.style.display = 'none'; iframePlayer.src = '';
                localPlayer.style.display = 'block'; localPlayer.src = url;
                localPlayer.play().catch(e => console.log(e));
            } else {
                localPlayer.style.display = 'none'; localPlayer.pause();
                iframePlayer.style.display = 'block'; iframePlayer.src = url;
            }

            playerSection.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            document.getElementById('comment-section').style.display = 'none';
            getComments(title);
        }

        document.getElementById('close-player').addEventListener('click', () => {
            document.getElementById('player-section').style.display = 'none';
            document.getElementById('video-player').src = '';
            document.getElementById('local-video-player').pause();
        });

        // 5. SEARCH & UI EVENT LISTENERS
        document.getElementById('search-btn').addEventListener('click', () => {
            const q = document.getElementById('search-input').value.trim();
            if(q) {
                document.getElementById('section-title').innerText = `🔍 Search: "${q}"`;
                loadAnime(`https://api.jikan.moe/v4/anime?q=${q}&limit=20`);
            }
        });

        document.getElementById('toggle-watchlist').addEventListener('click', () => document.getElementById('watchlist-sidebar').classList.add('active'));
        document.getElementById('close-sidebar-btn').addEventListener('click', () => document.getElementById('watchlist-sidebar').classList.remove('active'));

        document.getElementById('comment-btn').addEventListener('click', () => {
            const sec = document.getElementById('comment-section');
            sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
        });

        // 6. COMMENTS SYSTEM
        document.getElementById('submit-comment').addEventListener('click', async () => {
            const input = document.getElementById('comment-input');
            const btn = document.getElementById('submit-comment');
            if(!input.value.trim() || !window.activeTitle || !supabase) return;
            
            btn.innerText = "⏳"; btn.disabled = true;
            await supabase.from('anime_comments').insert([{ video_title: window.activeTitle, comment_text: input.value.trim() }]);
            input.value = ""; 
            getComments(window.activeTitle);
            btn.innerText = "Post"; btn.disabled = false;
        });

        async function getComments(title) {
            const list = document.getElementById('comment-list');
            if(!supabase) return list.innerHTML = '<li style="color:white;">DB Offline</li>';
            list.innerHTML = '<li style="color:white;">Loading...</li>';
            const { data } = await supabase.from('anime_comments').select('*').eq('video_title', title).order('created_at', { ascending: false });
            list.innerHTML = data && data.length ? data.map(r => `<li style="padding:8px; border-bottom:1px solid #30363d; color:white;"><strong>Guest:</strong> ${r.comment_text}</li>`).join('') : '<li style="color:white;">No comments yet.</li>';
        }

        // START APP
        refreshWatchlistUI();
        loadAnime('https://api.jikan.moe/v4/top/anime');
    </script>
</body>
</html>
